# dacli pinned dependency closure — for reproducible installs / CI (P11).
#
# DO NOT hand-edit. Regenerate from a clean venv after changing pyproject.toml:
#   python -m venv .lockenv && .lockenv/Scripts/python -m pip install -e ".[all,dev]"
#   .lockenv/Scripts/python -m pip freeze --exclude-editable > requirements.lock
#
# This is the FULL closure (base + every connector extra + dev tooling), so CI's
# test/lint/eval jobs run against an exact, frozen environment. The human-facing,
# loosely-bounded spec lives in pyproject.toml; a base `pip install -e .` stays
# lean (no snowflake/pinecone/google SDKs). The `pty` extra is intentionally
# excluded — pywinpty is Windows-only and CI runs on Linux.
#
# Note: boto3/botocore/s3transfer appear here as transitive deps of
# snowflake-connector-python (it requires boto3>=1.24), not as dacli deps.
