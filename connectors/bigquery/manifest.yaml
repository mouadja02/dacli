id: bigquery
name: BigQuery
description: Run Standard-SQL on BigQuery with native dry-run cost preview and snapshots
icon: "🔷"
class: connectors.bigquery.connector.BigQueryConnector
required_config: [project]
enabled: false
default_scope: read_only
golden_task:
  name: Create a table and verify it exists
  op: execute_bigquery_query
  description: Run CREATE TABLE, then confirm via `bq show` that the object exists.
  expectation: the bigquery_ddl_object_exists post-condition passes.
