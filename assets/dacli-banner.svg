<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dacli — a data-engineering agent for the terminal">
  <title>dacli — a data-engineering agent for the terminal</title>
  <defs>
    <linearGradient id="edge" x1="600" y1="120" x2="600" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <radialGradient id="bg" cx="760" cy="120" r="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1A22"/>
      <stop offset="1" stop-color="#080B0F"/>
    </radialGradient>
    <radialGradient id="iglow" cx="180" cy="170" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- faint harness motif: hexagon + DAG edges, right side -->
  <g opacity="0.10" stroke="#22D3EE" fill="none" stroke-width="1.5">
    <polygon points="1120,60 1180,95 1180,165 1120,200 1060,165 1060,95"/>
    <path d="M980 250 L1060 210 M1060 210 L1140 250 M1060 210 L1060 290"/>
    <circle cx="980" cy="250" r="4" fill="#22D3EE" stroke="none"/>
    <circle cx="1060" cy="210" r="4" fill="#22D3EE" stroke="none"/>
    <circle cx="1140" cy="250" r="4" fill="#22D3EE" stroke="none"/>
    <circle cx="1060" cy="290" r="4" fill="#22D3EE" stroke="none"/>
  </g>

  <!-- icon: six-component harness hexagon + prompt -->
  <g transform="translate(120,120) scale(1.0)">
    <circle cx="60" cy="60" r="58" fill="url(#iglow)"/>
    <polygon points="100,60 80,94.64 40,94.64 20,60 40,25.36 80,25.36"
             fill="#0B1117" stroke="url(#edge)" stroke-width="4" stroke-linejoin="round"/>
    <polyline points="46,46 60,60 46,74" fill="none" stroke="#22D3EE"
              stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="64" y="68" width="16" height="6.5" rx="3.25" fill="#67E8F9"/>
    <g fill="#67E8F9">
      <circle cx="100" cy="60" r="3.6"/><circle cx="80" cy="94.64" r="3.6"/>
      <circle cx="40" cy="94.64" r="3.6"/><circle cx="20" cy="60" r="3.6"/>
      <circle cx="40" cy="25.36" r="3.6"/><circle cx="80" cy="25.36" r="3.6"/>
    </g>
  </g>

  <!-- wordmark, set as a terminal prompt -->
  <g font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
    <text x="300" y="192" font-size="104" font-weight="700" fill="#22D3EE">&gt;</text>
    <text x="372" y="192" font-size="104" font-weight="700" fill="#E6EDF3" letter-spacing="-2">dacli</text>
    <rect x="688" y="118" width="26" height="78" fill="#67E8F9">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;0.92;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="304" y="240" font-size="25" font-weight="400" fill="#8B97A3" letter-spacing="0.2">a data-engineering agent for the terminal</text>
  </g>

  <!-- strapline: the six-component harness, echoing the six hexagon nodes -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
     font-size="15" font-weight="500" fill="#67849A">
    <g fill="#22D3EE"><circle cx="306" cy="290" r="3.2"/></g>
    <text x="318" y="295">Reasoning</text>
    <g fill="#22D3EE"><circle cx="430" cy="290" r="3.2"/></g>
    <text x="442" y="295">Memory</text>
    <g fill="#22D3EE"><circle cx="535" cy="290" r="3.2"/></g>
    <text x="547" y="295">Context</text>
    <g fill="#22D3EE"><circle cx="635" cy="290" r="3.2"/></g>
    <text x="647" y="295">Skills</text>
    <g fill="#22D3EE"><circle cx="717" cy="290" r="3.2"/></g>
    <text x="729" y="295">Orchestration</text>
    <g fill="#22D3EE"><circle cx="867" cy="290" r="3.2"/></g>
    <text x="879" y="295">Governance</text>
  </g>
</svg>
