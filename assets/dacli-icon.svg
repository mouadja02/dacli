<svg width="256" height="256" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dacli">
  <title>dacli</title>
  <defs>
    <!-- cyan-teal family, light at top to deep at bottom -->
    <linearGradient id="edge" x1="60" y1="14" x2="60" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <radialGradient id="glow" cx="60" cy="60" r="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="60" cy="60" r="52" fill="url(#glow)"/>

  <!-- six-component harness: flat-top hexagon -->
  <polygon points="100,60 80,94.64 40,94.64 20,60 40,25.36 80,25.36"
           fill="#0B1117" stroke="url(#edge)" stroke-width="4" stroke-linejoin="round"/>

  <!-- the prompt: chevron + block cursor -->
  <polyline points="46,46 60,60 46,74" fill="none" stroke="#22D3EE"
            stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="64" y="68" width="16" height="6.5" rx="3.25" fill="#67E8F9"/>

  <!-- six harness nodes, one per vertex (ℛ ℳ 𝒞 𝒮 𝒪 𝒢) -->
  <g fill="#67E8F9" filter="url(#soft)">
    <circle cx="100" cy="60" r="4"/>
    <circle cx="80" cy="94.64" r="4"/>
    <circle cx="40" cy="94.64" r="4"/>
    <circle cx="20" cy="60" r="4"/>
    <circle cx="40" cy="25.36" r="4"/>
    <circle cx="80" cy="25.36" r="4"/>
  </g>
  <g fill="#CFFAFE">
    <circle cx="100" cy="60" r="1.7"/>
    <circle cx="80" cy="94.64" r="1.7"/>
    <circle cx="40" cy="94.64" r="1.7"/>
    <circle cx="20" cy="60" r="1.7"/>
    <circle cx="40" cy="25.36" r="1.7"/>
    <circle cx="80" cy="25.36" r="1.7"/>
  </g>
</svg>
