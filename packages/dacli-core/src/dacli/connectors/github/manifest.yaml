id: github
name: GitHub
description: Manage files, workflows, and repositories on GitHub
icon: "🐙"
class: dacli.connectors.github.connector.GithubConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "github")``. owner/repo are derived from
# repository_url by the connector when not set explicitly.
config_fields:
  - name: token
    type: str
    required: true
    secret: true
    description: "GitHub personal access token."
  - name: repository_url
    type: str
    required: false
    default: ""
    description: "Repo URL (e.g. https://github.com/owner/repo); owner/repo are derived from it."
  - name: owner
    type: str
    required: false
    default: ""
    description: "Repo owner (overrides the value derived from repository_url)."
  - name: repo
    type: str
    required: false
    default: ""
    description: "Repo name (overrides the value derived from repository_url)."
  - name: branch
    type: str
    required: false
    default: "main"
    description: "Default branch."
  - name: timeout
    type: int
    required: false
    default: 60
    description: "Per-request timeout in seconds."
  - name: workflow_timeout
    type: int
    required: false
    default: 600
    description: "Timeout in seconds for a polled workflow run."
enabled: true
default_scope: read_only
golden_task:
  name: Push a file and confirm it landed
  op: push_github_file
  description: Commit a file, then re-read it off the branch and confirm the stored content hash matches what was pushed.
  expectation: the push_commit_landed post-condition passes.
