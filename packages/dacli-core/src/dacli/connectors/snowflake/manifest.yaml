id: snowflake
name: Snowflake
description: Execute SQL queries and manage your Snowflake data warehouse
icon: "❄️"
class: dacli.connectors.snowflake.connector.SnowflakeConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "snowflake")``.
config_fields:
  - name: account
    type: str
    required: true
    description: "Snowflake account identifier."
  - name: user
    type: str
    required: true
    description: "Login user."
  - name: password
    type: str
    required: true
    secret: true
    description: "Login password."
  - name: warehouse
    type: str
    required: true
    description: "Compute warehouse."
  - name: role
    type: str
    required: false
    default: ""
    description: "Role to assume."
  - name: database
    type: str
    required: true
    description: "Default database."
  - name: schema
    type: str
    required: false
    default: "PUBLIC"
    description: "Default schema."
  - name: query_timeout
    type: int
    required: false
    default: 300
    description: "Per-query timeout in seconds."
  - name: login_timeout
    type: int
    required: false
    default: 60
    description: "Login timeout in seconds."
  - name: network_timeout
    type: int
    required: false
    default: 60
    description: "Network timeout in seconds."
enabled: true
# Least-privilege default the connector ships with; widen the *grant* per
# deployment in config/policy.yaml (connectors.snowflake.scope).
default_scope: read_only
golden_task:
  name: Create and verify a Bronze table
  op: execute_snowflake_query
  description: Create a table, then confirm via INFORMATION_SCHEMA that its live column set matches intent.
  expectation: the create_table_matches_information_schema post-condition passes.
