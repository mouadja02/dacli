name: CI

# The DoD gate is mechanical, not a vibe (the roadmap §"Definition of Done"): every
# connector must ship its post-conditions, rollback strategy, permission scope,
# introspection op, SKILL.md, and a golden task, or the build fails. This is the
# structural cure for governance debt — capability (𝒮) and governance (𝒢) scale
# together or not at all.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .            # editable install (see P01): test the working tree
          pip install pytest          # dev-only; declare in pyproject [dev] once P10/P11 land

      # Run the DoD gate first and on its own so a governance-debt regression is
      # an unmistakable, named failure rather than buried in the suite.
      - name: Connector Definition-of-Done gate
        run: python -m unittest tests.test_connector_dod -v

      # Use pytest, not `unittest discover`: the latter silently skips bare
      # `def test_*` functions (all of tests/test_tui.py), so the TUI suite never
      # ran in CI and a regression merged green. pytest collects every test.
      - name: Full test suite
        run: pytest tests/ -q

      # Prove reliability, don't assert it: run the offline pass^k golden suite
      # against the simulated platforms on every PR. Fails loudly on an unguarded
      # destructive execution (the DROP-guard must hold across k runs).
      - name: Reliability eval (sim suite, pass^k)
        run: python -m eval --quick

      # End-to-end smoke of the headless agent surface: drives the real agent
      # loop + governance with a scripted (offline, free) LLM and asserts the
      # JSON contract holds and the process exits 0. No secrets required.
      - name: Headless e2e smoke (scripted LLM, offline)
        run: python run.py replay scenarios/smoke_headless.json --json
