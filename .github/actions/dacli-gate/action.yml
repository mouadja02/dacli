# dacli gate — run a governed dacli scenario as a CI check (F-9).
#
# `dacli replay` (core/headless.py) is headless with a JSON contract and a
# stable exit-code contract, which makes a governed+verified run a strong
# pre-merge gate:
#
#   0  scenario passed (every turn completed, nothing blocked)
#   1  agent error / agent needed user input
#   2  governance block (an action was denied/blocked)
#   3  scenario error (script exhausted / unanswered input request)
#
# The step fails the build on any non-zero exit; the JSON result is printed to
# the step log for inspection. Scripted (llm_script) scenarios run offline and
# need no secrets.
#
# Example workflow:
#
#   jobs:
#     dacli-gate:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v5
#         - uses: ./.github/actions/dacli-gate
#           with:
#             scenario: scenarios/smoke_headless.json

name: "dacli gate"
description: "Replay a dacli scenario headlessly and fail the build on a non-zero exit (2 = governance block, 1 = agent error, 3 = scenario error)."

inputs:
  scenario:
    description: "Path to a dacli scenario file (JSON or YAML) to replay"
    required: true
  python-version:
    description: "Python version to set up"
    required: false
    default: "3.12"
  install:
    description: "pip requirement spec for dacli ('.' = the checked-out repo, or e.g. 'dacli==0.1.0')"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install dacli
      shell: bash
      run: python -m pip install --quiet "${{ inputs.install }}"
    - name: Replay the gated scenario
      shell: bash
      run: dacli replay "${{ inputs.scenario }}" --json
