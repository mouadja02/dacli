# Categorizes the auto-generated release notes (used by release.yml's
# generate_release_notes). Buckets merged PRs by label; falls back to a catch-all.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
  categories:
    - title: ⚠️ Breaking changes
      labels:
        - breaking
        - semver:major
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 🛡️ Governance & reliability
      labels:
        - governance
        - reliability
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Other changes
      labels:
        - "*"
