id: bigquery
name: BigQuery
description: Run Standard-SQL on BigQuery with native dry-run cost preview and snapshots
icon: "🔷"
class: dacli.connectors.bigquery.connector.BigQueryConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "bigquery")``.
config_fields:
  - name: project
    type: str
    required: true
    description: "Default GCP project id."
  - name: dataset
    type: str
    required: false
    default: ""
    description: "Default dataset for unqualified table refs."
  - name: location
    type: str
    required: false
    default: "US"
    description: "Default location/region for jobs."
  - name: credentials_path
    type: str
    required: false
    default: ""
    description: "Path to a service-account JSON (GOOGLE_APPLICATION_CREDENTIALS)."
  - name: bq_binary
    type: str
    required: false
    default: "bq"
    description: "Path to the bq CLI binary."
  - name: timeout
    type: int
    required: false
    default: 300
    description: "Command timeout in seconds."
enabled: false
default_scope: read_only
golden_task:
  name: Create a table and verify it exists
  op: execute_bigquery_query
  description: Run CREATE TABLE, then confirm via `bq show` that the object exists.
  expectation: the bigquery_ddl_object_exists post-condition passes.
