id: databricks
name: Databricks
description: Run SQL on a Databricks SQL warehouse with Delta time-travel rollback
icon: "🧱"
class: dacli.connectors.databricks.connector.DatabricksConnector
# Config declared here (manifest-config pattern, 09/A-4) rather than in a typed
# Settings section; read via ``ConnectorConfig(settings, "databricks")``.
config_fields:
  - name: host
    type: str
    required: true
    description: "Workspace URL, e.g. https://<workspace>.cloud.databricks.com."
  - name: token
    type: str
    required: true
    secret: true
    description: "Personal access token."
  - name: warehouse_id
    type: str
    required: true
    description: "SQL warehouse id statements run against."
  - name: catalog
    type: str
    required: false
    default: ""
    description: "Default Unity Catalog catalog."
  - name: schema
    type: str
    required: false
    default: "default"
    description: "Default schema."
  - name: databricks_binary
    type: str
    required: false
    default: "databricks"
    description: "Path to the databricks CLI binary."
  - name: timeout
    type: int
    required: false
    default: 300
    description: "Command timeout in seconds."
enabled: false
default_scope: read_only
golden_task:
  name: Run a query and confirm SUCCEEDED
  op: execute_databricks_sql
  description: Execute a statement and confirm the SQL warehouse reported state SUCCEEDED.
  expectation: the databricks_statement_succeeded post-condition passes.
