id: airflow
name: Apache Airflow
description: Operate and debug Airflow DAGs — trigger, monitor, pause, and inspect runs
icon: "🌀"
class: dacli.connectors.airflow.connector.AirflowConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "airflow")``.
config_fields:
  - name: base_url
    type: str
    required: true
    description: "Airflow base URL, e.g. https://airflow.example.com."
  - name: username
    type: str
    required: false
    default: ""
    description: "Basic-auth username (alternative to token)."
  - name: password
    type: str
    required: false
    secret: true
    description: "Basic-auth password."
  - name: token
    type: str
    required: false
    secret: true
    description: "Bearer token (alternative to basic auth)."
  - name: poll_interval
    type: int
    required: false
    default: 5
    description: "Seconds between run-state polls."
  - name: timeout
    type: int
    required: false
    default: 600
    description: "Overall timeout in seconds for a polled run."
enabled: false
default_scope: read_only
golden_task:
  name: Trigger a DAG and confirm success
  op: trigger_airflow_dag
  description: Trigger a DAG run, poll to a terminal state, and confirm the run reached success.
  expectation: the airflow_run_succeeded post-condition passes.
