id: dbt
name: dbt
description: Compile, run, test, and build dbt models; parse the manifest for lineage
icon: "🔧"
class: dacli.connectors.dbt.connector.DbtConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "dbt")``.
config_fields:
  - name: project_dir
    type: str
    required: true
    description: "Path to the dbt project (where dbt_project.yml lives)."
  - name: profiles_dir
    type: str
    required: false
    default: ""
    description: "Path to profiles.yml (defaults to ~/.dbt)."
  - name: target
    type: str
    required: false
    default: ""
    description: "dbt target/profile output to use."
  - name: dbt_binary
    type: str
    required: false
    default: "dbt"
    description: "Path to the dbt CLI binary."
  - name: timeout
    type: int
    required: false
    default: 900
    description: "Command timeout in seconds."
enabled: false
default_scope: read_only
golden_task:
  name: Build models and verify tests pass
  op: dbt_build
  description: Run dbt build, then confirm via run_results.json that every node materialized and every test passed.
  expectation: the dbt_nodes_succeeded and dbt_tests_passed post-conditions pass.
