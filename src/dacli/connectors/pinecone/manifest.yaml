id: pinecone
name: Pinecone (Vector Search)
description: Search documentation using vector embeddings for RAG
icon: "🌲"
class: dacli.connectors.pinecone.connector.PineconeConnector
# Config declared here (manifest-config pattern, 09/A-4); read via
# ``ConnectorConfig(settings, "pinecone")``. The old separate ``embeddings``
# section is folded in here as the ``embedding_*`` fields.
config_fields:
  - name: api_key
    type: str
    required: true
    secret: true
    description: "Pinecone API key."
  - name: index_name
    type: str
    required: true
    description: "Pinecone index to query."
  - name: environment
    type: str
    required: false
    default: ""
    description: "Pinecone environment."
  - name: top_k
    type: int
    required: false
    default: 5
    description: "Number of matches to return."
  - name: include_metadata
    type: bool
    required: false
    default: true
    description: "Return match metadata (content/source/title)."
  - name: embedding_provider
    type: str
    required: false
    default: ""
    description: "Embeddings provider (currently: openai)."
  - name: embedding_api_key
    type: str
    required: false
    secret: true
    description: "Embeddings provider API key."
  - name: embedding_model
    type: str
    required: false
    default: ""
    description: "Embeddings model id."
enabled: true
default_scope: read_only
golden_task:
  name: Search documentation
  op: search_snowflake_docs
  description: Run a semantic search and confirm a list of matches is returned.
  expectation: the returns_matches post-condition passes.
