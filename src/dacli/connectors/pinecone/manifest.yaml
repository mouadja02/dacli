id: pinecone
name: Pinecone (Vector Search)
description: Search documentation using vector embeddings for RAG
icon: "🌲"
class: dacli.connectors.pinecone.connector.PineconeConnector
required_config: [api_key, index_name]
enabled: true
default_scope: read_only
golden_task:
  name: Search documentation
  op: search_snowflake_docs
  description: Run a semantic search and confirm a list of matches is returned.
  expectation: the returns_matches post-condition passes.
