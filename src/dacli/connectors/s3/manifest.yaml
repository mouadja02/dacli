id: s3
name: Amazon S3
description: List, read, upload, and delete S3 objects with versioned rollback
icon: "🪣"
class: dacli.connectors.s3.connector.S3Connector
# Config declared here (manifest-config pattern, 09/A-4) rather than in a typed
# Settings section. Users set values under ``connector_config.s3.*`` in
# config.yaml; the connector reads them via ``ConnectorConfig(settings, "s3")``.
config_fields:
  - name: bucket
    type: str
    required: true
    description: "Default S3 bucket name."
  - name: prefix
    type: str
    required: false
    default: ""
    description: "Key prefix to prepend to all object paths."
  - name: region
    type: str
    required: false
    default: ""
    description: "AWS region (e.g. us-east-1)."
  - name: profile
    type: str
    required: false
    default: ""
    description: "Named AWS CLI profile to use."
  - name: aws_binary
    type: str
    required: false
    default: "aws"
    description: "Path to the aws CLI binary."
  - name: timeout
    type: int
    required: false
    default: 300
    description: "Command timeout in seconds."
enabled: false
default_scope: read_only
golden_task:
  name: Upload an object and confirm it landed
  op: put_s3_object
  description: Upload content to a key, then confirm via head-object that the key exists.
  expectation: the s3_object_present post-condition passes.
